<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Real Seller Shop</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b1b3a;
    color:white;
}

/* HEADER */
header{
    background:#102a5c;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

header h1{
    font-size:20px;
}

.container{
    width:90%;
    margin:auto;
}

/* HERO */
.hero{
    margin-top:15px;
    background:linear-gradient(90deg,#1a3c7a,#0b1b3a);
    padding:20px;
    border-radius:15px;
    animation:fade 2s ease-in-out;
}

@keyframes fade{
    from{opacity:0;}
    to{opacity:1;}
}

/* PRODUCTS */
.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
    margin-top:20px;
}

.card{
    background:#102a5c;
    padding:15px;
    border-radius:15px;
    text-align:center;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
    background:#163a7a;
}

.card img{
    width:100%;
    border-radius:10px;
}

.price{
    color:#00ff88;
    font-weight:bold;
}

button,a{
    display:block;
    margin-top:8px;
    padding:8px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    text-decoration:none;
}

button{
    background:#ffcc00;
}

.order{
    background:#25D366;
    color:white;
}

/* FOOTER */
footer{
    margin-top:20px;
    text-align:center;
    padding:15px;
    background:#102a5c;
}
</style>
</head>

<body>

<header>
    <h1>Real Seller Shop</h1>
    <span>M JALAL</span>
</header>

<div class="container">

<div class="hero">
    <h2>🔥 Best Dropshipping Deals</h2>
    <p>High quality products at lowest prices</p>
</div>

<div class="products">

    <div class="card">
        <img src="https://via.placeholder.com/200">
        <h3>Smart Watch</h3>
        <p class="price">Rs. 2499</p>
        <button onclick="add('Smart Watch')">Add to Cart</button>
        <a class="order" href="https://wa.me/923195363123?text=Order Smart Watch">Order</a>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/200">
        <h3>Headphones</h3>
        <p class="price">Rs. 3999</p>
        <button onclick="add('Headphones')">Add to Cart</button>
        <a class="order" href="https://wa.me/923195363123?text=Order Headphones">Order</a>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/200">
        <h3>Bluetooth Speaker</h3>
        <p class="price">Rs. 1799</p>
        <button onclick="add('Speaker')">Add to Cart</button>
        <a class="order" href="https://wa.me/923195363123?text=Order Speaker">Order</a>
    </div>

</div>

<h3>🛒 Cart</h3>
<ul id="cart"></ul>

</div>

<footer>
    © 2026 Real Seller Shop | M JALAL
</footer>

<script>
function add(product){
    let li = document.createElement("li");
    li.textContent = product;
    document.getElementById("cart").appendChild(li);
}
</script>

</body>
</html>
