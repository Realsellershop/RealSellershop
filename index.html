<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Real Seller Shop</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#ffffff;
}

/* HEADER */
header{
    text-align:center;
    padding:20px;
    border-bottom:1px solid #ddd;
}
header h1{
    margin:0;
}
nav a{
    margin:0 10px;
    text-decoration:none;
    color:black;
}

/* HERO */
.hero{
    text-align:center;
    padding:40px 20px;
}
.hero h2{
    font-size:28px;
}

/* OWNER */
.owner{
    text-align:center;
    padding:20px;
}
.owner img{
    width:100px;
    height:100px;
    border-radius:50%;
}

/* POSTS STYLE (WordPress jaisa) */
.posts{
    max-width:800px;
    margin:auto;
    padding:20px;
}

.post{
    border-bottom:1px solid #ddd;
    padding:20px 0;
}

.post img{
    width:100%;
    border-radius:5px;
}

.title{
    font-size:20px;
    margin:10px 0;
}

.price{
    color:#e60023;
    font-weight:bold;
}

.order{
    display:inline-block;
    margin-top:10px;
    padding:8px 15px;
    background:#25D366;
    color:white;
    text-decoration:none;
    border-radius:5px;
}

/* FOOTER */
footer{
    text-align:center;
    padding:20px;
    border-top:1px solid #ddd;
    margin-top:30px;
}
</style>
</head>

<body>

<header>
    <h1>Real Seller Shop</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#">Shop</a>
        <a href="#">Contact</a>
    </nav>
</header>

    <h2>Best Online Store in Pakistan</h2>
    <p>Fast Delivery | Trusted Seller</p>
</div>

<div class="owner">
    <img src="https://via.placeholder.com/100">
    <h3>M JALAL</h3>
    <p>📞 03195363123</p>
</div>

<div class="posts">

    <div class="post">
        <img src="https://via.placeholder.com/600x300">
        <div class="title">Wireless Earbuds</div>
        <div class="price">Rs. 2,499</div>
        <a class="order" href="https://wa.me/923195363123?text=Order Wireless Earbuds Rs 2499">Order Now</a>
    </div>

    <div class="post">
        <img src="https://via.placeholder.com/600x300">

        <a class="order" href="https://wa.me/923195363123?text=Order Mini Speaker Rs 1799">Order Now</a>
    </div>

    <div class="post">
        <img src="https://via.placeholder.com/600x300">

        <div class="price">Rs. 999</div>
        <a class="order" href="https://wa.me/923195363123?text=Order LED Lamp Rs 999">Order Now</a>
    </div>

</div>

<footer>
    © 2026 Real Seller Shop
</footer>

</html>
