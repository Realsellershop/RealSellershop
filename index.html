<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Real Seller Shop</title>

<style>
.logo{
    width:150px;
}
/* ===== GLOBAL ===== */
body{
    margin:0;
    font-family:Arial;
    background:#0b1b3a;
    color:white;
}

/* ===== SPLASH SCREEN ===== */
#splash{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#07122b;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:9999;
    animation: hideSplash 3s forwards;
}

#splash img{
    width:160px;
    height:160px;
    border-radius:50%;
    border:4px solid #00bfff;
    box-shadow:0 0 20px #00bfff;
    animation: zoomIn 1.5s ease-in-out;
}

#splash h1{
    margin-top:15px;
    color:white;
    font-size:26px;
    letter-spacing:3px;
    animation: glow 1.2s infinite alternate;
}

/* ===== ANIMATIONS ===== */
@keyframes zoomIn{
    from{transform:scale(0);opacity:0;}
    to{transform:scale(1);opacity:1;}
}

.typing-text{
    font-size:28px;
    text-align:center;
    color:white;
    width:0;
    margin:auto;
    white-space:nowrap;
    overflow:hidden;
    border-right:3px solid #00bfff;
    animation: typing 3s steps(25) forwards,
               blink 0.7s infinite;
    letter-spacing:2px;
}

@keyframes typing{
    from{
        width:0;
    }
    to{
        width:100%;
    }
}

@keyframes blink{
    50%{
        border-color:transparent;
    }
};}
}

@keyframes hideSplash{
    0%{opacity:1;}
    80%{opacity:1;}
    100%{opacity:0;visibility:hidden;}
}

/* ===== HEADER ===== */
header{
    background:#102a5c;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

/* ===== HERO ===== */
.hero{
    padding:20px;
    text-align:center;
    background:linear-gradient(90deg,#102a5c,#0b1b3a);
}

/* ===== PRODUCTS ===== */
.container{
    width:90%;
    margin:auto;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
    margin-top:20px;
}

.card{
    background:#102a5c;
    padding:15px;
    border-radius:15px;
    text-align:center;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
    background:#163a7a;
}

.card img{
    width:100%;
    border-radius:10px;
}

.price{
    color:#00ff88;
    font-weight:bold;
}

button,a{
    display:block;
    margin-top:8px;
    padding:8px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    text-decoration:none;
}

button{
    background:#ffcc00;
}

.order{
    background:#25D366;
    color:white;
}

/* ===== CART ===== */
footer{
    text-align:center;
    padding:15px;
    background:#102a5c;
    margin-top:20px;
}

</style>
</head>

<body>

<!-- ===== SPLASH SCREEN ===== -->
<div id="splash">
    <img src="https://raw.githubusercontent.com/Realsellershop/RealSellershop/main/WhatsApp%20Image%202026-05-01%20at%201.05.09%20AM.jpeg">
    <h1>CEO JALAL</h1>
</div>

<!-- ===== HEADER ===== -->
<header>
    <img src="https://raw.githubusercontent.com/Realsellershop/RealSellershop/main/logo.jpg" class="logo">
    <span>M JALAL</span>
</header>
<!-- ===== HERO ===== -->
<div class="hero">
    <h2>Welcome To My Store</h2>
    <p>APKA APNA Real Seller Shop </p>
</div>

<!-- ===== PRODUCTS ===== -->
<div class="container">

<div class="products">

    <div class="card">
        <img src="https://via.placeholder.com/200">
        <h3>Smart Watch</h3>
        <p class="price">Rs. 2499</p>
        <button onclick="add('Smart Watch')">Add to Cart</button>
        <a class="order" href="https://wa.me/923195363123?text=Order Smart Watch">Order</a>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/200">
        <h3>Headphones</h3>
        <p class="price">Rs. 3999</p>
        <button onclick="add('Headphones')">Add to Cart</button>
        <a class="order" href="https://wa.me/923195363123?text=Order Headphones">Order</a>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/200">
        <h3>Speaker</h3>
        <p class="price">Rs. 1799</p>
        <button onclick="add('Speaker')">Add to Cart</button>
        <a class="order" href="https://wa.me/923195363123?text=Order Speaker">Order</a>
    </div>

</div>

</div>

<footer>
    © 2026 Real Seller Shop | M JALAL
</footer>

<script>

function add(product){
    alert(product + " added to cart!");
}

</script>

</body>
</html>
