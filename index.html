<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Real Seller Shop</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    margin:0;
    font-family:Arial;
    background:#0b1b3a;
    color:white;
}

/* ===== SPLASH ===== */
#splash{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#07122b;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:99999;
}

#splash img{
    width:170px;
    height:170px;
    border-radius:50%;
    border:4px solid #00bfff;
    box-shadow:0 0 25px #00bfff;
    animation:zoomIn 1.5s ease-in-out;
}

#splash h1{
    margin-top:15px;
    font-size:26px;
    animation:glow 1.2s infinite alternate;
}

@keyframes zoomIn{
    from{transform:scale(0);opacity:0;}
    to{transform:scale(1);opacity:1;}
}

@keyframes glow{
    from{text-shadow:0 0 5px #00bfff;}
    to{text-shadow:0 0 25px #00bfff;}
}

/* HEADER */
header{
    background:#102a5c;
    padding:12px;
    display:flex;
    justify-content:space-between;
}

/* CONTAINER */
.container{
    width:90%;
    margin:auto;
}

/* PRODUCTS */
.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
    margin-top:10px;
}

.card{
    background:#102a5c;
    padding:10px;
    border-radius:12px;
    text-align:center;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
}

.card img{
    width:100%;
    border-radius:10px;
}

button{
    padding:8px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

/* CART */
#cartBox{
    display:none;
    background:#0f2b5a;
    padding:10px;
    margin-top:10px;
    border-radius:10px;
}

</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
    <img src="https://raw.githubusercontent.com/Realsellershop/RealSellershop/main/WhatsApp%20Image%202026-05-01%20at%201.05.09%20AM.jpeg">
    <h1>CEO JALAL</h1>
</div>

<header>
<h3>Real Seller Shop</h3>
<button onclick="showCart()">🛒 Cart</button>
</header>

<div class="container">

<div class="products" id="productList">

    <div class="card">
        <img src="https://via.placeholder.com/200">
        <h3>Smart Watch</h3>
        <p>Rs 2499</p>
        <button onclick="addCart('Smart Watch')">Add</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/200">
        <h3>Headphones</h3>
        <p>Rs 3999</p>
        <button onclick="addCart('Headphones')">Add</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/200">
        <h3>Speaker</h3>
        <p>Rs 1799</p>
        <button onclick="addCart('Speaker')">Add</button>
    </div>

</div>

<!-- CART -->
<div id="cartBox">
<h3>🛒 Cart</h3>
<ul id="cartItems"></ul>
<button onclick="checkout()">WhatsApp Checkout</button>
</div>

</div>

<script>

/* SPLASH OFF */
setTimeout(()=>{
    document.getElementById("splash").style.display="none";
},3000);

/* CART */
let cart=[];

/* ADD CART */
function addCart(item){
    cart.push(item);
    alert(item+" added!");
}

/* SHOW CART */
function showCart(){
    document.getElementById("cartBox").style.display="block";

    let list=document.getElementById("cartItems");
    list.innerHTML="";

    cart.forEach(i=>{
        let li=document.createElement("li");
        li.innerText=i;
        list.appendChild(li);
    });
}

/* CHECKOUT */
function checkout(){
    let msg="Order: "+cart.join(",");
    window.open("https://wa.me/923195363123?text="+msg);
}

</script>

</body>
</html>
