<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Real Seller Shop</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f8f8f8;
}

/* HEADER */
header{
    background:white;
    padding:15px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

/* HERO */
.hero{
    text-align:center;
    padding:40px 20px;
}
.hero h1{
    font-size:30px;
}
.hero p{
    color:gray;
}

/* OWNER */
.owner{
    text-align:center;
    background:white;
    padding:20px;
}
.owner img{
    width:100px;
    height:100px;
    border-radius:50%;
}

/* PRODUCTS */
.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:15px;
    padding:20px;
}

.card{
    background:white;
    border-radius:10px;
    padding:10px;
    box-shadow:0 0 5px rgba(0,0,0,0.1);
    text-align:center;
}

.card img{
    width:100%;
}

.title{
    font-size:14px;
    margin:10px 0;
}

.price{
    color:#ff6a00;
    font-weight:bold;
}

.order{
    display:block;
    margin-top:10px;
    padding:8px;
    background:#25D366;
    color:white;
    text-decoration:none;
    border-radius:5px;
}

/* FOOTER */
footer{
    text-align:center;
    padding:15px;
    background:#111;
    color:white;
}
</style>
</head>

<body>

<header>
    Real Seller Shop
</header>

<div class="hero">
    <h1>Best Online Store in Pakistan</h1>
    <p>Fast Delivery | Trusted Seller</p>
</div>

<div class="owner">
    <img src="https://via.placeholder.com/100">
    <h3>M JALAL</h3>
    <p>📞 03195363123</p>
</div>

<div class="products">

    <div class="card">
        <img src="https://via.placeholder.com/200">
        <div class="title">Wireless Earbuds</div>
        <div class="price">Rs. 2,499</div>
        <a class="order" href="https://wa.me/923195363123?text=Order Wireless Earbuds Rs 2499">Order Now</a>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/200">
        <div class="title">Mini Speaker</div>
        <div class="price">Rs. 1,799</div>
        <a class="order" href="https://wa.me/923195363123?text=Order Mini Speaker Rs 1799">Order Now</a>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/200">
        <div class="title">LED Light</div>
        <div class="price">Rs. 999</div>
        <a class="order" href="https://wa.me/923195363123?text=Order LED Light Rs 999">Order Now</a>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/200">
        <div class="title">Mobile Holder</div>
        <div class="price">Rs. 699</div>
        <a class="order" href="https://wa.me/923195363123?text=Order Mobile Holder Rs 699">Order Now</a>
    </div>

</div>

<footer>
    © 2026 Real Seller Shop
</footer>

</body>
</html>
