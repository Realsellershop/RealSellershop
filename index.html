<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Real Seller Shop</title>

<style>

/* ===== GLOBAL ===== */
body{
    margin:0;
    font-family:Arial;
    background:#0b1b3a;
    color:white;
}

/* ===== SPLASH ===== */
#splash{
    position:fixed;
    width:100%;
    height:100%;
    background:#07122b;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:9999;
    animation: hideSplash 3s forwards;
}

#splash img{
    width:150px;
    height:150px;
    border-radius:50%;
    border:4px solid #00bfff;
    box-shadow:0 0 20px #00bfff;
    animation: zoomIn 1.5s;
}

#splash h1{
    margin-top:10px;
    animation: glow 1s infinite alternate;
}

@keyframes zoomIn{
    from{transform:scale(0);}
    to{transform:scale(1);}
}

@keyframes glow{
    from{text-shadow:0 0 5px #00bfff;}
    to{text-shadow:0 0 20px #00bfff;}
}

@keyframes hideSplash{
    80%{opacity:1;}
    100%{opacity:0;visibility:hidden;}
}

/* ===== HEADER ===== */
header{
    background:#102a5c;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px;
}

.logo{
    width:120px;
}

nav a{
    margin:0 10px;
    color:white;
    text-decoration:none;
}

.owner{
    color:#00bfff;
}

/* CART COUNT */
.cart-count{
    background:red;
    padding:5px 10px;
    border-radius:50%;
}

/* ===== SEARCH ===== */
.search{
    text-align:center;
    margin:10px;
}

.search input{
    width:80%;
    padding:10px;
    border-radius:10px;
    border:none;
}

/* ===== SLIDER ===== */
.slider{
    height:200px;
    background-size:cover;
    background-position:center;
    margin:10px;
    border-radius:15px;
    transition:1s;
}

/* ===== CATEGORY ===== */
.categories{
    text-align:center;
}

.categories button{
    margin:5px;
    padding:8px 12px;
    border:none;
    border-radius:10px;
    background:#00bfff;
    color:white;
    cursor:pointer;
}

/* ===== PRODUCTS ===== */
.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
    padding:10px;
}

.card{
    background:#102a5c;
    padding:10px;
    border-radius:10px;
    text-align:center;
    position:relative;
}

.card:hover{
    transform:scale(1.05);
}

.card img{
    width:100%;
}

/* HOT BADGE */
.hot{
    position:absolute;
    top:5px;
    left:5px;
    background:red;
    padding:3px 6px;
    font-size:12px;
}

.price{
    color:#00ff88;
}

/* BUTTONS */
button{
    padding:5px;
    border:none;
    border-radius:5px;
    margin-top:5px;
}

.order{
    display:block;
    background:#25D366;
    color:white;
    text-decoration:none;
    margin-top:5px;
    padding:5px;
}

/* ===== FOOTER ===== */
footer{
    text-align:center;
    background:#102a5c;
    padding:10px;
}

</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
    <img src="https://raw.githubusercontent.com/Realsellershop/RealSellershop/main/logo.jpg">
    <h1>CEO JALAL</h1>
</div>

<!-- HEADER -->
<header>
    <img src="https://raw.githubusercontent.com/Realsellershop/RealSellershop/main/logo.jpg" class="logo">

    <nav>
        <a href="#">Home</a>
        <a href="#">Products</a>
    </nav>

    <div>
        <span class="owner">M JALAL</span>
        🛒 <span class="cart-count" id="count">0</span>
    </div>
</header>

<!-- SEARCH -->
<div class="search">
    <input type="text" placeholder="Search..." onkeyup="search(this.value)">
</div>

<!-- SLIDER -->
<div class="slider" id="slider"></div>

<!-- CATEGORY -->
<div class="categories">
    <button onclick="filter('all')">All</button>
    <button onclick="filter('watch')">Watch</button>
    <button onclick="filter('audio')">Audio</button>
</div>

<!-- PRODUCTS -->
<div class="products" id="products">

<div class="card watch">
    <span class="hot">HOT</span>
    <img src="https://via.placeholder.com/200">
    <h3>Smart Watch</h3>
    <p class="price">Rs.2499</p>
    <button onclick="add('Watch')">Add</button>
    <a class="order" href="#">Order</a>
</div>

<div class="card audio">
    <img src="https://via.placeholder.com/200">
    <h3>Headphones</h3>
    <p class="price">Rs.3999</p>
    <button onclick="add('Headphones')">Add</button>
    <a class="order" href="#">Order</a>
</div>

</div>

<footer>
© Real Seller Shop | CEO JALAL
</footer>

<script>

/* CART */
let count=0;
function add(){
    count++;
    document.getElementById("count").innerText=count;
}

/* SEARCH */
function search(val){
    let cards=document.querySelectorAll(".card");
    cards.forEach(c=>{
        c.style.display=c.innerText.toLowerCase().includes(val.toLowerCase())?"block":"none";
    });
}

/* FILTER */
function filter(cat){
    let cards=document.querySelectorAll(".card");
    cards.forEach(c=>{
        c.style.display=(cat=="all"||c.classList.contains(cat))?"block":"none";
    });
}

/* SLIDER */
let imgs=[
 "https://via.placeholder.com/800x200",
 "https://via.placeholder.com/800x200/ff0000",
 "https://via.placeholder.com/800x200/0000ff"
];

let i=0;
setInterval(()=>{
    document.getElementById("slider").style.backgroundImage=`url(${imgs[i]})`;
    i=(i+1)%imgs.length;
},2000);

</script>

</body>
</html>
