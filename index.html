<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Real Seller Shop</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b1b3a;
    color:white;
}

/* HEADER */
header{
    background:#102a5c;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

header h1{
    font-size:20px;
}

.container{
    width:90%;
    margin:auto;
}

/* HERO */
.hero{
    margin-top:15px;
    background:linear-gradient(90deg,#1a3c7a,#0b1b3a);
    padding:20px;
    border-radius:15px;
    animation:fade 2s ease-in-out;
}

.typing-text{
    font-size:28px;
    text-align:center;
    color:white;
    width:0;
    margin:auto;
    white-space:nowrap;
    overflow:hidden;
    border-right:3px solid #00bfff;
    animation: typing 3s steps(25) forwards,
               blink 0.7s infinite;
    letter-spacing:2px;
}

<div id="splash">
    <img src="your-image.jpg" alt="CEO JALAL">
    <h1>CEO JALAL</h1>
</div>
    /* SPLASH SCREEN */
#splash{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#0b1b3a;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:9999;
    animation: fadeOut 3s forwards;
    animation-delay:2.5s;
}

/* IMAGE ANIMATION */
#splash img{
    width:150px;
    height:150px;
    border-radius:50%;
    border:4px solid #00bfff;
    animation: pop 1.5s ease-in-out;
}

/* TEXT ANIMATION */
#splash h1{
    color:white;
    margin-top:15px;
    font-size:24px;
    letter-spacing:2px;
    animation: glow 1.5s infinite alternate;
}

/* IMAGE POP */
@keyframes pop{
    from{transform:scale(0);}
    to{transform:scale(1);}
}

/* GLOW TEXT */
@keyframes glow{
    from{
        text-shadow:0 0 5px #00bfff;
    }
    to{
        text-shadow:0 0 20px #00bfff, 0 0 40px #00bfff;
    }
}

/* SPLASH DISAPPEAR */
@keyframes fadeOut{
    to{
        opacity:0;
        visibility:hidden;
    }
}
    @keyframes typing{
    from{
        width:0;
    }
    to{
        width:100%;
    }
}

@keyframes blink{
    50%{
        border-color:transparent;
    }
}
}

/* PRODUCTS */
.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
    margin-top:20px;
}

.card{
    background:#102a5c;
    padding:15px;
    border-radius:15px;
    text-align:center;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
    background:#163a7a;
}

.card img{
    width:100%;
    border-radius:10px;
}

.price{
    color:#00ff88;
    font-weight:bold;
}

button,a{
    display:block;
    margin-top:8px;
    padding:8px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    text-decoration:none;
}

button{
    background:#ffcc00;
}

.order{
    background:#25D366;
    color:white;
}

/* FOOTER */
footer{
    margin-top:20px;
    text-align:center;
    padding:15px;
    background:#102a5c;
}
</style>
</head>

<body>

<header>
    <h1>Real Seller Shop</h1>
    <span>M JALAL</span>
</header>

<div class="container">

<div class="hero">
    <h2 class="typing-text">Welcome To My Store</h2>
    <p>APKA APNA Real Seller Shop</p>
</div>

<div class="products">

    <div class="card">
        <img src="https://via.placeholder.com/200">
        <h3>Smart Watch</h3>
        <p class="price">Rs. 1599</p>
        <button onclick="add('Smart Watch')">Add to Cart</button>
        <a class="order" href="https://wa.me/923195363123?text=Order Smart Watch">Order</a>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/200">
        <h3>Headphones</h3>
        <p class="price">Rs. 2499</p>
        <button onclick="add('Headphones')">Add to Cart</button>
        <a class="order" href="https://wa.me/923195363123?text=Order Headphones">Order</a>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/200">
        <h3>Bluetooth Speaker</h3>
        <p class="price">Rs. FREE </p>
        <button onclick="add('Speaker')">Add to Cart</button>
        <a class="order" href="https://wa.me/923195363123?text=Order Speaker">Order</a>
    </div>

</div>

<h3>🛒 Cart</h3>
<ul id="cart"></ul>

</div>

<footer>
    © 2026 Real Seller Shop|CEO  M JALAL
</footer>

<script>
function add(product){
    let li = document.createElement("li");
    li.textContent = product;
    document.getElementById("cart").appendChild(li);
}
</script>

</body>
</html>
