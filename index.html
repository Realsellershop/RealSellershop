<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Real Seller Shop</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f5f5f5;
}

header{
    text-align:center;
    padding:20px;
    background:#ff6a00;
    color:white;
}

.owner{
    text-align:center;
    padding:20px;
    background:white;
}
.owner img{
    width:120px;
    height:120px;
    border-radius:50%;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
    padding:20px;
}

.card{
    background:white;
    padding:10px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    text-align:center;
}

.card img{
    width:100%;
}

.title{
    margin:10px 0;
}

.price{
    color:#ff6a00;
    font-weight:bold;
}

.order-btn{
    display:block;
    margin-top:10px;
    padding:10px;
    background:#25D366;
    color:white;
    text-decoration:none;
    border-radius:5px;
}

footer{
    text-align:center;
    padding:15px;
    background:#111;
    color:white;
}
</style>
</head>

<body>

<header>
    <h2>Real Seller Shop</h2>
    <p>All Pakistan Delivery Available</p>
</header>

<div class="owner">
    <img src="https://via.placeholder.com/120">
    <h3>M JALAL</h3>
    <p>📞 +923195363123</p>
</div>

<div class="products">

    <div class="card">
        <img src="https://via.placeholder.com/200">
        <div class="title">Wireless Earbuds</div>
        <div class="price">Rs. 2,499</div>
        <a class="order-btn" href="https://wa.me/923195363123?text=I want to order Wireless Earbuds - Rs. 2499">Order Now</a>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/200">
        <div class="title">Mini Bluetooth Speaker</div>
        <div class="price">Rs. 1,899</div>
        <a class="order-btn" href="https://wa.me/923195363123?text=I want to order Mini Bluetooth Speaker - Rs. 1899">Order Now</a>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/200">
        <div class="title">Smart LED Bulb</div>
        <div class="price">Rs. 999</div>
        <a class="order-btn" href="https://wa.me/923195363123?text=I want to order Smart LED Bulb - Rs. 999">Order Now</a>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/200">
        <div class="title">Car Phone Holder</div>
        <div class="price">Rs. 699</div>
        <a class="order-btn" href="https://wa.me/923195363123?text=I want to order Car Phone Holder - Rs. 699">Order Now</a>
    </div>

</div>

<footer>
    <p>© 2026 Real Seller Shop | Owner: M JALAL</p>
</footer>

</body>
</html>
