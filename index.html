<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Real Seller PRO MAX</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b1b3a;
    color:white;
}

/* HEADER */
header{
    background:#102a5c;
    padding:12px;
    display:flex;
    justify-content:space-between;
}

/* BUTTON */
button{
    padding:8px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

/* CONTAINER */
.container{width:90%;margin:auto}

/* PRODUCTS */
.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
    margin-top:10px;
}

.card{
    background:#102a5c;
    padding:10px;
    border-radius:12px;
    text-align:center;
}

.card img{width:100%;border-radius:10px}

/* CART */
#cartBox{
    display:none;
    background:#0f2b5a;
    padding:10px;
    margin-top:10px;
    border-radius:10px;
}

/* ADMIN */
#adminBox{
    display:none;
    background:#111;
    padding:10px;
    margin-top:10px;
    border-radius:10px;
}

/* LOGIN */
#loginBox{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
}

input{
    padding:10px;
    margin:5px;
    width:90%;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
  <div>
    <h2>Admin Login</h2>
    <input id="email" placeholder="Email">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<header>
<h3>Real Seller PRO MAX</h3>
<div>
<button onclick="showCart()">Cart</button>
<button onclick="showAdmin()">Admin</button>
</div>
</header>

<div class="container">

<!-- PRODUCTS -->
<div class="products" id="productList"></div>

<!-- CART -->
<div id="cartBox">
<h3>Cart</h3>
<ul id="cartItems"></ul>
<button onclick="checkout()">WhatsApp Checkout</button>
</div>

<!-- ADMIN -->
<div id="adminBox">
<h3>Add Product</h3>
<input id="pname" placeholder="Name">
<input id="pprice" placeholder="Price">
<input id="pimg" placeholder="Image URL">
<button onclick="addProduct()">Add</button>
</div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

<script>

/* 🔥 FIREBASE CONFIG (APNA PROJECT PASTE KARNA HAI) */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "https://YOUR_PROJECT.firebaseio.com",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "XXXX",
  appId: "XXXX"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* CART */
let cart=[];

/* LOGIN */
function login(){
    let email=document.getElementById("email").value;
    let pass=document.getElementById("pass").value;

    firebase.auth().signInWithEmailAndPassword(email,pass)
    .then(()=>{
        document.getElementById("loginBox").style.display="none";
        loadProducts();
    })
    .catch(err=>alert("Login Failed"));
}

/* LOAD PRODUCTS FROM FIREBASE */
function loadProducts(){
    db.ref("products").on("value",snap=>{
        let box=document.getElementById("productList");
        box.innerHTML="";

        snap.forEach(data=>{
            let p=data.val();

            let div=document.createElement("div");
            div.className="card";

            div.innerHTML=`
                <img src="${p.img}">
                <h3>${p.name}</h3>
                <p>Rs ${p.price}</p>
                <button onclick="addCart('${p.name}')">Add</button>
            `;

            box.appendChild(div);
        });
    });
}

/* ADD CART */
function addCart(name){
    cart.push(name);
    alert(name+" added");
}

/* CART */
function showCart(){
    document.getElementById("cartBox").style.display="block";

    let list=document.getElementById("cartItems");
    list.innerHTML="";

    cart.forEach(i=>{
        let li=document.createElement("li");
        li.innerText=i;
        list.appendChild(li);
    });
}

/* CHECKOUT */
function checkout(){
    let msg="Order: "+cart.join(",");
    window.open("https://wa.me/923195363123?text="+msg);
}

/* ADMIN */
function showAdmin(){
    document.getElementById("adminBox").style.display="block";
}

/* ADD PRODUCT TO FIREBASE */
function addProduct(){
    let name=document.getElementById("pname").value;
    let price=document.getElementById("pprice").value;
    let img=document.getElementById("pimg").value;

    db.ref("products").push({
        name:name,
        price:price,
        img:img
    });

    alert("Product Added!");
}

</script>

</body>
</html>
