<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Real Seller Shop</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#eef2f3;
    transition:0.3s;
}

/* DARK MODE */
.dark{
    background:#111;
    color:white;
}

/* CONTAINER */
.container{
    width:90%;
    margin:auto;
    padding:20px;
}

/* HEADER */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

button{
    padding:8px 15px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

/* SLIDER */
.slider{
    margin-top:20px;
    height:200px;
    border-radius:20px;
    background-size:cover;
    background-position:center;
    transition:0.5s;
}

/* PRODUCTS */
.products{
    display:flex;
    gap:15px;
    margin-top:20px;
}

.card{
    flex:1;
    background:white;
    padding:15px;
    border-radius:15px;
    text-align:center;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
    box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.card img{
    width:100%;
    border-radius:10px;
}

.price{
    color:green;
    font-weight:bold;
}

.order{
    display:block;
    margin-top:10px;
    padding:8px;
    background:#25D366;
    color:white;
    text-decoration:none;
    border-radius:10px;
}

/* CART */
.cart{
    margin-top:20px;
    padding:15px;
    background:white;
    border-radius:15px;
}
</style>
</head>

<body>

<div class="container">

<header>
    <h2>Real Seller Shop</h2>
    <button onclick="toggleDark()">🌙 Dark Mode</button>
</header>

<div class="slider" id="slider"></div>

<div class="products">

    <div class="card">
        <img src="https://via.placeholder.com/200">
        <h3>Headphones</h3>
        <p class="price">Rs. 3999</p>
        <button onclick="addToCart('Headphones')">Add to Cart</button>
        <a class="order" href="https://wa.me/923195363123?text=Order Headphones">Order</a>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/200">
        <h3>Smart Watch</h3>
        <p class="price">Rs. 2499</p>
        <button onclick="addToCart('Smart Watch')">Add to Cart</button>
        <a class="order" href="https://wa.me/923195363123?text=Order Watch">Order</a>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/200">
        <h3>Speaker</h3>
        <p class="price">Rs. 1799</p>
        <button onclick="addToCart('Speaker')">Add to Cart</button>
        <a class="order" href="https://wa.me/923195363123?text=Order Speaker">Order</a>
    </div>

</div>

<div class="cart">
    <h3>🛒 Cart Items:</h3>
    <ul id="cartList"></ul>
</div>

</div>

<script>

/* DARK MODE */
function toggleDark(){
    document.body.classList.toggle("dark");
}

/* SLIDER */
let images = [
 "https://via.placeholder.com/800x200",
 "https://via.placeholder.com/800x200/ff0000",
 "https://via.placeholder.com/800x200/0000ff"
];

let i = 0;
setInterval(()=>{
    document.getElementById("slider").style.backgroundImage = `url(${images[i]})`;
    i = (i+1)%images.length;
},2000);

/* CART */
function addToCart(product){
    let li = document.createElement("li");
    li.textContent = product;
    document.getElementById("cartList").appendChild(li);
}

</script>

</body>
</html>
